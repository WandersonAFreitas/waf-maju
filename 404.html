<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wfreitas Solution</title>
    <!-- Redireciona para o index.html com o path original codificado -->
    <script>
      // GitHub Pages SPA redirect trick
      // Salva o path atual e redireciona para a raiz com o path como query string
      var segmentCount = 1; // número de segmentos do repositório (1 para /waf-maju/)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    Redirecionando...
  </body>
</html>
