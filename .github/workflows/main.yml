name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Dispara o deploy automático a cada push na branch principal

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-size: 20

      - name: Install and Build 🔧
        run: |
          npm ci
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Pasta padrão de build do Vite
          branch: gh-pages # Branch que o GitHub Pages usará para servir os arquivos estáticos
